<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le avventure sarde di Gilla | FRAMMENTA</title>
    <link rel="stylesheet" href="../style.css">
    <!-- Barba.js & GSAP -->
    <script src="https://unpkg.com/@barba/core"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>
</head>

<body data-barba="wrapper">

    <main data-barba="container" data-barba-namespace="exhibition">
        <a href="../past.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
        <div class="content-wrapper">
            <!-- Hero Image -->
            <div class="sub-hero-image">
                <img src="" alt="Hero Image">
            </div>

            <!-- Page Title -->
            <section class="hero-section" style="padding-top: 0;">
                <h2 class="section-title big" style="margin-bottom: 2rem;">TITLE</h2>

                <div class="hero-grid">
                    <div class="hero-image">
                        <img src="" alt="Exhibition Poster">
                    </div>
                    <div class="hero-text">
                        <div class="event-details column">
                            <div class="detail-block">
                                <h3 class="detail-title">La mostra</h3>
                                <p></p>
                                <p style="margin-top: 1rem;"></p>
                            </div>
                            <div class="detail-block">
                                <h3 class="detail-title">L'artista</h3>
                                <p></p>
                                <p style="margin-top: 1rem;"></p>

                                <!-- Optional -->
                                <div class="artist-link-wrapper">
                                    <a href="" target="_blank" class="btn-outline">
                                        Leggi di lei su <br> Bologna Today
                                    </a>
                                </div>
                                <!-------------->

                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Showcase Section -->
            <section class="showcase-section">
                <div class="section-header">
                    <h2 class="section-title">EXPOSITION SHOWCASE</h2>
                </div>

                <div class="poster-slider-container showcase-slider">
                    <!-- Showcase Navigation (Side-by-side) -->
                    <button class="slider-arrow prev slidePrev side-arrow">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                    </button>
                    <button class="slider-arrow next slideNext side-arrow">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>

                    <div class="poster-grid">
                        <div class="poster-card active">
                            <img src="" alt="">
                        </div>
                        <div class="poster-card">
                            <img src="" alt="">
                        </div>
                        <div class="poster-card">
                            <img src="" alt="">
                        </div>
                        <div class="poster-card">
                            <img src="" alt="">
                        </div>
                        <div class="poster-card">
                            <img src="" alt="">
                        </div>
                    </div>
                </div>
            </section>


        </div>
    </main>

    <script src="../main.js"></script>
</body>

</html>
